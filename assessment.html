<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Profile Assessment — Premier & Pinnacle Pools</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></scr\ipt>
<style>
:root{--navy:#0f1e38;--navy-mid:#1a2f52;--navy-light:#243d6b;--gold:#c9973a;--gold-light:#e8b857;--gold-pale:#f5e8cc;--cream:#faf7f2;--white:#fff;--slate:#6b7a94;--text:#1a1a2e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
#cover{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden;}
#cover::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(201,151,58,.12) 0%,transparent 60%);}
.cover-eyebrow{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,151,58,.4);padding:6px 16px;margin-bottom:36px;position:relative;}
.cover-title{font-family:"Playfair Display",serif;font-size:clamp(36px,7vw,68px);font-weight:900;color:#fff;text-align:center;line-height:1.05;position:relative;margin-bottom:8px;}
.cover-title span{color:var(--gold);}
.cover-sub{font-size:15px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:12px;position:relative;}
.cover-desc{font-size:13px;color:rgba(255,255,255,.35);text-align:center;max-width:480px;line-height:1.7;margin-bottom:44px;position:relative;}
.cover-meta{display:flex;gap:32px;margin-bottom:52px;position:relative;}
.cover-meta-item{text-align:center;}
.cover-meta-item .num{font-family:"Playfair Display",serif;font-size:28px;color:var(--gold);font-weight:700;}
.cover-meta-item .lbl{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.divider-line{width:1px;height:40px;background:rgba(201,151,58,.25);align-self:center;}
.intake-form{position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(201,151,58,.2);padding:32px;width:100%;max-width:480px;margin-bottom:32px;}
.intake-form h3{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
.field-row{display:flex;flex-direction:column;gap:14px;}
.field-group{display:flex;flex-direction:column;gap:6px;}
.field-group label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:500;}
.field-group input,.field-group select{background:rgba(255,255,255,.06);border:1px solid rgba(201,151,58,.25);color:#fff;padding:12px 14px;font-family:"DM Sans",sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.field-group input:focus,.field-group select:focus{border-color:var(--gold);}
.field-group select option{background:var(--navy);color:#fff;}
.btn-start{background:var(--gold);color:var(--navy);border:none;padding:16px 40px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;position:relative;}
.btn-start:hover{background:var(--gold-light);transform:translateY(-1px);}
#assessment{display:none;min-height:100vh;}
.assess-header{background:var(--navy);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(201,151,58,.15);}
.assess-logo{font-family:"Playfair Display",serif;font-size:16px;color:#fff;font-weight:700;}
.assess-logo span{color:var(--gold);}
.progress-wrap{flex:1;max-width:320px;margin:0 32px;}
.progress-label{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-bar{height:3px;background:rgba(255,255,255,.1);}
.progress-fill{height:100%;background:var(--gold);transition:width .4s ease;width:0%;}
.section-lbl{font-size:12px;color:var(--gold);font-family:"DM Mono",monospace;letter-spacing:1px;}
.assess-body{max-width:780px;margin:0 auto;padding:48px 24px 80px;}
.section-header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid rgba(201,151,58,.15);}
.section-number{font-family:"DM Mono",monospace;font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.section-title{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.section-desc{font-size:14px;color:var(--slate);line-height:1.6;}
.ci-note{background:rgba(15,30,56,.05);border-left:3px solid var(--gold);padding:12px 16px;font-size:13px;color:var(--slate);line-height:1.6;margin-bottom:32px;font-style:italic;}
.question-card{background:#fff;border:1px solid rgba(15,30,56,.08);padding:28px 32px;margin-bottom:20px;box-shadow:0 2px 12px rgba(15,30,56,.04);animation:slideUp .3s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-family:"DM Mono",monospace;font-size:11px;color:var(--slate);letter-spacing:1px;margin-bottom:8px;}
.q-trait-badge{display:inline-block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;font-weight:600;margin-bottom:10px;border-radius:2px;}
.badge-A{background:rgba(46,125,50,.12);color:#2e7d32;}
.badge-B{background:rgba(21,101,192,.12);color:#1565c0;}
.badge-C{background:rgba(106,27,154,.12);color:#6a1b9a;}
.badge-D{background:rgba(191,54,12,.12);color:#bf360c;}
.q-text{font-size:16px;font-weight:500;color:var(--navy);line-height:1.5;margin-bottom:20px;}
.scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--slate);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.scale-options{display:flex;gap:8px;}
.scale-btn{flex:1;height:44px;border:1.5px solid rgba(15,30,56,.12);background:transparent;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;color:var(--slate);transition:all .15s;}
.scale-btn:hover{border-color:var(--gold);color:var(--navy);background:var(--gold-pale);}
.scale-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.adj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:4px;}
.adj-btn{padding:10px 14px;border:1.5px solid rgba(15,30,56,.12);background:transparent;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--slate);text-align:left;transition:all .15s;}
.adj-btn:hover{border-color:var(--gold);color:var(--navy);background:var(--gold-pale);}
.adj-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.adj-count{font-size:11px;color:var(--gold);font-family:"DM Mono",monospace;margin-top:8px;}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:40px;}
.btn-back{background:transparent;border:1px solid rgba(15,30,56,.15);color:var(--slate);padding:12px 24px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;}
.btn-next{background:var(--navy);border:none;color:#fff;padding:14px 36px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.btn-next::after{content:" →";}
.error-msg{font-size:13px;color:#c0392b;margin-top:8px;display:none;}
#results{display:none;}
.results-hero{background:var(--navy);padding:60px 24px 80px;position:relative;overflow:hidden;}
.results-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 50% 80% at 90% 50%,rgba(201,151,58,.1) 0%,transparent 60%);}
.results-inner{max-width:960px;margin:0 auto;position:relative;}
.results-eyebrow{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.results-name{font-family:"Playfair Display",serif;font-size:clamp(32px,6vw,54px);font-weight:900;color:#fff;margin-bottom:4px;}
.results-type{font-family:"Playfair Display",serif;font-size:clamp(18px,3vw,28px);color:var(--gold);font-style:italic;margin-bottom:20px;}
.results-tagline{font-size:15px;color:rgba(255,255,255,.6);max-width:560px;line-height:1.7;}
.profile-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px;}
.profile-chip{padding:8px 16px;border:1px solid rgba(201,151,58,.3);font-size:12px;color:var(--gold-light);letter-spacing:.5px;}
.results-body{max-width:960px;margin:0 auto;padding:48px 24px 80px;}
.section-heading{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.section-sub{font-size:13px;color:var(--slate);margin-bottom:28px;}
.curve-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:48px;}
.curve-card{background:#fff;border:1px solid rgba(15,30,56,.08);padding:20px;box-shadow:0 2px 8px rgba(15,30,56,.04);}
.curve-card-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.curve-letter{font-family:"Playfair Display",serif;font-size:24px;font-weight:900;}
.curve-name{font-size:13px;font-weight:600;color:var(--navy);}
.curve-score-label{font-size:11px;color:var(--slate);margin-bottom:12px;font-family:"DM Mono",monospace;}
.curve-canvas-wrap{position:relative;height:80px;}
.curve-position-label{font-size:12px;margin-top:6px;font-weight:600;text-align:center;}
.curve-desc{font-size:12px;color:var(--slate);line-height:1.5;margin-top:8px;}
.radar-section{background:#fff;border:1px solid rgba(15,30,56,.08);padding:32px;margin-bottom:48px;box-shadow:0 2px 8px rgba(15,30,56,.04);}
.radar-legend{display:flex;gap:20px;margin-bottom:16px;font-size:12px;color:var(--slate);}
.radar-legend span{display:flex;align-items:center;gap:6px;}
.radar-legend .dot{width:10px;height:10px;border-radius:2px;}
.radar-wrap{position:relative;height:340px;max-width:420px;margin:0 auto;}
.trait-block{background:#fff;border:1px solid rgba(15,30,56,.08);padding:28px;margin-bottom:16px;box-shadow:0 2px 8px rgba(15,30,56,.04);}
.trait-block-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.trait-letter-big{font-family:"Playfair Display",serif;font-size:32px;font-weight:900;width:44px;text-align:center;}
.trait-block-name{font-family:"Playfair Display",serif;font-size:18px;font-weight:700;color:var(--navy);}
.trait-block-pos{font-size:12px;font-family:"DM Mono",monospace;margin-top:2px;}
.spectrum-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.spectrum-label-left,.spectrum-label-right{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--slate);width:90px;flex-shrink:0;}
.spectrum-label-right{text-align:right;}
.spectrum-track{flex:1;height:12px;background:rgba(15,30,56,.06);position:relative;}
.spectrum-fill{height:100%;transition:width 1s ease;}
.spectrum-dot{width:18px;height:18px;border-radius:50%;border:3px solid #fff;position:absolute;top:50%;transform:translateY(-50%);transition:left 1s ease;}
.trait-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:16px;}
.trait-col h5{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-family:"DM Mono",monospace;}
.trait-col ul{list-style:none;padding:0;}
.trait-col ul li{font-size:12px;color:var(--text);line-height:1.7;padding:2px 0;}
.trait-col ul li::before{content:"• ";color:var(--gold);}
.gap-card{background:#fff;border:1px solid rgba(15,30,56,.08);padding:24px;margin-bottom:12px;box-shadow:0 2px 8px rgba(15,30,56,.04);}
.gap-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:8px;flex-wrap:wrap;}
.gap-letter{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;width:28px;flex-shrink:0;}
.gap-label{font-size:13px;font-weight:600;color:var(--navy);flex:1;min-width:100px;}
.gap-tags{display:flex;gap:8px;flex-wrap:wrap;}
.gap-tag{font-size:11px;padding:3px 10px;border-radius:2px;font-weight:600;}
.gap-tag.public{background:rgba(201,151,58,.15);color:#8a6400;}
.gap-tag.private{background:rgba(15,30,56,.1);color:var(--navy);}
.gap-tag.gap-high{background:rgba(191,54,12,.12);color:#bf360c;}
.gap-text{font-size:13px;color:var(--slate);line-height:1.6;margin-top:4px;}
.type-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:36px;margin-bottom:48px;position:relative;overflow:hidden;}
.type-hero::after{content:"";position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(201,151,58,.08);}
.type-hero .eyebrow{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;position:relative;}
.type-hero h3{font-family:"Playfair Display",serif;font-size:26px;color:#fff;margin-bottom:8px;position:relative;}
.type-hero .type-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.7;max-width:600px;position:relative;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:48px;}
.insight-card{background:#fff;border:1px solid rgba(15,30,56,.08);padding:28px;box-shadow:0 2px 12px rgba(15,30,56,.04);}
.insight-card-icon{font-size:26px;margin-bottom:12px;}
.insight-card-title{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.insight-card-body{font-size:13px;color:var(--slate);line-height:1.7;}
.coaching-box{background:var(--navy);padding:40px;margin-bottom:48px;position:relative;overflow:hidden;}
.coaching-box h3{font-family:"Playfair Display",serif;font-size:20px;color:#fff;margin-bottom:4px;position:relative;}
.coaching-box .sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;position:relative;font-family:"DM Mono",monospace;}
.coaching-list{list-style:none;display:flex;flex-direction:column;gap:12px;position:relative;}
.coaching-list li{display:flex;gap:12px;font-size:14px;color:rgba(255,255,255,.75);line-height:1.6;}
.coaching-list li::before{content:"▸";color:var(--gold);flex-shrink:0;margin-top:1px;}
.actions-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:60px;}
.btn-print{background:var(--gold);border:none;color:var(--navy);padding:14px 28px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-retake{background:transparent;border:1.5px solid rgba(15,30,56,.2);color:var(--navy);padding:14px 28px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;}
@media print{#cover,.actions-row{display:none;}#results{display:block!important;}}
@media(max-width:600px){.assess-header{padding:16px;flex-wrap:wrap;gap:12px;}.progress-wrap{order:3;max-width:100%;flex-basis:100%;margin:0;}.trait-cols{grid-template-columns:1fr;}.curve-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="cover">
  <div class="cover-eyebrow">Premier &amp; Pinnacle Pools &middot; Human Profile</div>
  <h1 class="cover-title">Who Are<br><span>You, Really?</span></h1>
  <p class="cover-sub">A deep behavioral profile &mdash; beyond sales, beyond roles</p>
  <p class="cover-desc">Based on the Culture Index ABCD framework. Measures Autonomy, Social-Ability, Pace, and Conformity &mdash; how you&rsquo;re wired as a human being. Uses the two-perspective method to reveal your public vs. private self.</p>
  <div class="cover-meta">
    <div class="cover-meta-item"><div class="num">48</div><div class="lbl">Questions</div></div>
    <div class="divider-line"></div>
    <div class="cover-meta-item"><div class="num">~15</div><div class="lbl">Minutes</div></div>
    <div class="divider-line"></div>
    <div class="cover-meta-item"><div class="num">4</div><div class="lbl">Core Traits</div></div>
    <div class="divider-line"></div>
    <div class="cover-meta-item"><div class="num">2x</div><div class="lbl">Perspectives</div></div>
  </div>
  <div class="intake-form">
    <h3>Tell us about you</h3>
    <div class="field-row">
      <div class="field-group"><label>Full Name</label><input type="text" id="respName" placeholder="e.g. Brooks Boyer" /></div>
      <div class="field-group"><label>Email Address</label><input type="email" id="respEmail" placeholder="your@email.com" /></div>
      <div class="field-group">
        <label>Role / Position</label>
        <select id="respRole">
          <option value="">Select your current role...</option>
          <option value="New Sales Rep">New Sales Rep</option>
          <option value="Sales Rep">Sales Rep</option>
          <option value="Senior Sales Rep">Senior Sales Rep</option>
          <option value="Sales Manager">Sales Manager</option>
          <option value="Project Manager">Project Manager</option>
          <option value="Field Crew">Field Crew / Labor</option>
          <option value="Office / Admin">Office / Admin</option>
          <option value="Candidate">Candidate (Applying)</option>
          <option value="Owner">Owner / Principal</option>
        </select>
      </div>
      <div class="field-group">
        <label>Company</label>
        <select id="respCompany">
          <option value="Premier Pools & Spas - Temecula">Premier Pools &amp; Spas &mdash; Temecula</option>
          <option value="Pinnacle Pools & Spas - Dallas">Pinnacle Pools &amp; Spas &mdash; Dallas</option>
        </select>
      </div>
    </div>
  </div>
  <button class="btn-start" onclick="startAssessment()">Begin Assessment</button>
</div>

<div id="assessment">
  <div class="assess-header">
    <div class="assess-logo">Human <span>Profile</span></div>
    <div class="progress-wrap">
      <div class="progress-label"><span id="progressText">Section 1 of 8</span><span id="progressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="section-lbl" id="sectionLabel">Autonomy</div>
  </div>
  <div class="assess-body" id="assessBody"></div>
</div>

<div id="results">
  <div class="results-hero">
    <div class="results-inner">
      <div class="results-eyebrow">Human Profile &middot; ABCD Framework &middot; Culture Index Method</div>
      <div class="results-name" id="rName"></div>
      <div class="results-type" id="rType"></div>
      <div class="results-tagline" id="rTagline"></div>
      <div class="profile-chips" id="rChips"></div>
    </div>
  </div>
  <div class="results-body">
    <div class="section-heading">Your ABCD Profile</div>
    <p class="section-sub">Where you fall on the bell curve for each dimension. The center line = the average person. Left = lower expression of that trait, Right = higher. Neither side is better &mdash; each has distinct assets, liabilities, and motivators.</p>
    <div class="curve-grid" id="curveGrid"></div>
    <div class="radar-section">
      <div class="section-heading" style="margin-bottom:4px">Natural vs. Adapted Profile</div>
      <p class="section-sub" style="margin-bottom:16px">How you present publicly (dashed/gold) vs. how you actually are privately (solid/navy). Large gaps reveal where you&rsquo;re masking your natural wiring.</p>
      <div class="radar-legend">
        <span><span class="dot" style="background:#c9973a"></span>Public (how others see you)</span>
        <span><span class="dot" style="background:#0f1e38"></span>Private (how you actually are)</span>
      </div>
      <div class="radar-wrap"><canvas id="radarChart" role="img" aria-label="Radar chart comparing public and private ABCD profiles">ABCD comparison radar chart.</canvas></div>
    </div>
    <div class="type-hero" id="typeHero"></div>
    <div class="section-heading">Trait Deep Dive</div>
    <p class="section-sub">Full breakdown of each ABCD dimension &mdash; your position, assets, liabilities, and motivators based on the Culture Index framework.</p>
    <div id="traitSection"></div>
    <div style="margin-bottom:48px">
      <div class="section-heading">Public vs. Private Self</div>
      <p class="section-sub" style="margin-bottom:20px">The two-response method captures where you perform differently than you actually operate. Gaps above 20 points indicate significant masking &mdash; which costs energy over time.</p>
      <div id="gapCards"></div>
    </div>
    <div class="section-heading">Key Insights</div>
    <p class="section-sub" style="margin-bottom:24px">What your profile combination means in practice.</p>
    <div class="cards-grid" id="insightCards"></div>
    <div class="coaching-box">
      <div class="sub">Manager Playbook</div>
      <h3>How to Lead &amp; Develop <span id="coachName">This Person</span></h3>
      <ul class="coaching-list" id="coachingList"></ul>
    </div>
    <div class="actions-row">
      <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
      <button class="btn-retake" onclick="retake()">&larr; Retake</button>
    </div>
  </div>
</div>

<script>
const SECTIONS=[
  {id:"A_pub",title:"How Others See You — Drive & Independence",trait:"A",pass:"public",
   desc:"Answer based on how coworkers, your manager, or family would describe you.",
   note:"This is your public face. How you show up in the room, not how you feel inside.",
   questions:[
    {id:"ap1",text:"Others would say I take charge in ambiguous situations rather than waiting for direction.",trait:"A"},
    {id:"ap2",text:"People see me as confident and comfortable voicing disagreement.",trait:"A"},
    {id:"ap3",text:"My colleagues would describe me as driven by personal achievement more than team recognition.",trait:"A"},
    {id:"ap4",text:"Others perceive me as someone who prefers to own the outcome rather than share the wheel.",trait:"A"},
    {id:"ap5",text:"People around me see me as self-sufficient — rarely needing help to act.",trait:"A"},

let state={name:"",email:"",role:"",company:"",currentSection:0,answers:{},adjPublic:[],adjPrivate:[]};
const TOTAL=SECTIONS.length+2;

function startAssessment(){
  const name=document.getElementById("respName").value.trim();
  const email=document.getElementById("respEmail").value.trim();
  const role=document.getElementById("respRole").value;
  const company=document.getElementById("respCompany").value;
  if(!name||!role){alert("Please enter your name and select your role.");return;}
  Object.assign(state,{name,email,role,company});
  document.getElementById("cover").style.display="none";
  document.getElementById("assessment").style.display="block";
  renderSection(0);window.scrollTo(0,0);
}

function renderSection(idx){
  state.currentSection=idx;
  const pct=Math.round(idx/TOTAL*100);
  document.getElementById("progressText").textContent="Section "+(idx+1)+" of "+TOTAL;
  document.getElementById("progressPct").textContent=pct+"%";
  document.getElementById("progressFill").style.width=pct+"%";
  if(idx===SECTIONS.length){renderAdjSection(false);return;}
  if(idx===SECTIONS.length+1){renderAdjSection(true);return;}
  const sec=SECTIONS[idx];
  document.getElementById("sectionLabel").textContent=sec.title.split("—")[1]?.trim()||sec.title;
  const doneQ=SECTIONS.slice(0,idx).reduce((a,s)=>a+s.questions.length,0);
  const badgeClass={A:"badge-A",B:"badge-B",C:"badge-C",D:"badge-D"};
  let html=`<div class="section-header">
    <div class="section-number">Section ${idx+1} of ${TOTAL} &middot; ${sec.pass==="public"?"Public Self":"Private Self"}</div>
    <div class="section-title">${sec.title}</div>
    <div class="section-desc">${sec.desc}</div>
  </div><div class="ci-note">${sec.note}</div>`;
  sec.questions.forEach((q,qi)=>{
    const gIdx=doneQ+qi+1;const saved=state.answers[q.id];
    html+=`<div class="question-card" style="animation-delay:${qi*.05}s">
      <div class="q-num">Q${gIdx}</div>
      <span class="q-trait-badge ${badgeClass[q.trait]}">Trait ${q.trait}</span>
      <div class="q-text">${q.text}</div>
      <div class="scale-labels"><span>Strongly Disagree</span><span>Strongly Agree</span></div>
      <div class="scale-options">${[1,2,3,4,5].map(v=>`<button class="scale-btn${saved==v?" selected":""}" onclick="sel('${q.id}',${v},this)">${v}</button>`).join("")}</div>
      <div class="error-msg" id="err_${q.id}">Please answer this question.</div>
    </div>`;
  });
  html+=`<div class="nav-row">${idx>0?`<button class="btn-back" onclick="goBack()">&larr; Back</button>`:"<div></div>"}<button class="btn-next" onclick="goNext()">${idx<TOTAL-1?"Next Section":"See My Profile"}</button></div>`;
  document.getElementById("assessBody").innerHTML=html;window.scrollTo(0,0);
}

function renderAdjSection(isPrivate){
  const idx=isPrivate?SECTIONS.length+1:SECTIONS.length;
  const pct=Math.round(idx/TOTAL*100);
  document.getElementById("progressText").textContent="Section "+(idx+1)+" of "+TOTAL;
  document.getElementById("progressPct").textContent=pct+"%";
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("sectionLabel").textContent=isPrivate?"Private Words":"Public Words";
  const bank=isPrivate?ADJ_PRIVATE:ADJ_PUBLIC;

  const saved=state[key];

    <div class="section-number">Section ${idx+1} of ${TOTAL} &middot; Word Choice</div>
    <div class="section-title">${isPrivate?"Words that describe who you actually are":"Words that describe how others see you"}</div>

function sel(qid,val,btn){
  state.answers[qid]=val;
  btn.closest(".scale-options").querySelectorAll(".scale-btn").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("err_"+qid).style.display="none";
}

function togAdj(key,word,btn){
  const arr=state[key];
  if(arr.includes(word)){arr.splice(arr.indexOf(word),1);btn.classList.remove("selected");}
  else{if(arr.length>=10)return;arr.push(word);btn.classList.add("selected");}
  const c=document.getElementById("adjCount");
  if(c)c.textContent=arr.length+" selected"+(arr.length<6?" (need at least 6)":"");
  if(arr.length>=6){const e=document.getElementById("err_adj");if(e)e.style.display="none";}
}

function goBack(){renderSection(state.currentSection-1);}

function goNext(){
  const idx=state.currentSection;
  if(idx===SECTIONS.length||idx===SECTIONS.length+1){
    const key=idx===SECTIONS.length?"adjPublic":"adjPrivate";
    if(state[key].length<6){document.getElementById("err_adj").style.display="block";return;}
  } else {
    const sec=SECTIONS[idx];let valid=true;
    sec.questions.forEach(q=>{if(!state.answers[q.id]){document.getElementById("err_"+q.id).style.display="block";valid=false;}});
    if(!valid){document.querySelector(".error-msg[style*=block]")?.scrollIntoView({behavior:"smooth",block:"center"});return;}
  }
  if(idx<TOTAL-1){renderSection(idx+1);}else{showResults();}
}

function computeScores(){
  const raw={A:{pub:[],priv:[]},B:{pub:[],priv:[]},C:{pub:[],priv:[]},D:{pub:[],priv:[]}};
  SECTIONS.forEach(sec=>{
    const pass=sec.pass==="public"?"pub":"priv";
    sec.questions.forEach(q=>{raw[q.trait][pass].push(state.answers[q.id]||3);});
  });
  function adjW(words,bank,trait){
    let b=0;words.forEach(w=>{if(bank.traitMap[w]===trait)b+=0.4;});return b;
  }
  function avg(arr){return arr.length?arr.reduce((a,b)=>a+b)/arr.length:3;}
  function norm(v,adj){return Math.round(Math.min(100,Math.max(0,(Math.min(5,Math.max(1,v+adj))-1)/4*100)));}
  const s={};
  ["A","B","C","D"].forEach(t=>{
    const pa=avg(raw[t].pub),pra=avg(raw[t].priv);
    const padj=adjW(state.adjPublic,ADJ_PUBLIC,t),pradj=adjW(state.adjPrivate,ADJ_PRIVATE,t);
    s[t]={pub:norm(pa,padj),priv:norm(pra,pradj)};
    s[t].gap=Math.abs(s[t].pub-s[t].priv);
  });
  return s;
}

function classify(score){
  if(score<30)return{label:"Far Left",short:"Low"};
  if(score<43)return{label:"Left of Line",short:"Below Average"};
  if(score<58)return{label:"Center",short:"Average"};
  if(score<70)return{label:"Right of Line",short:"Above Average"};
  return{label:"Far Right",short:"High"};
}

function buildCurves(s){
  document.getElementById("curveGrid").innerHTML=Object.entries(s).map(([t,v])=>{
    const td=TRAIT_DATA[t];const pos=classify(v.priv);
    return `<div class="curve-card">
      <div class="curve-card-header"><div class="curve-letter" style="color:${td.color}">${t}</div><div class="curve-name">${td.name}</div></div>
      <div class="curve-score-label">Score: ${v.priv}/100 &middot; ${pos.label}</div>
      <div class="curve-canvas-wrap"><canvas id="cv_${t}" width="200" height="80" role="img" aria-label="${td.name} bell curve score ${v.priv}">Score: ${v.priv}</canvas></div>
      <div class="curve-position-label" style="color:${td.color}">${pos.short}</div>
      <div class="curve-desc">${v.priv>=50?td.highLabel+" tendency":td.lowLabel+" tendency"}</div>
    </div>`;
  }).join("");
  setTimeout(()=>Object.entries(s).forEach(([t,v])=>drawCurve("cv_"+t,v.priv,TRAIT_DATA[t].color)),100);
}

function drawCurve(id,score,color){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext("2d"),W=c.width,H=c.height,mean=W/2,sd=W/6;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();ctx.strokeStyle="rgba(15,30,56,0.15)";ctx.lineWidth=1.5;
  for(let x=0;x<=W;x++){const z=(x-mean)/sd,y=H*0.85-(H*0.7)*Math.exp(-0.5*z*z);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  const sx=(score/100)*W;
  ctx.beginPath();ctx.fillStyle=color+"30";ctx.moveTo(0,H*0.85);
  for(let x=0;x<=sx;x++){const z=(x-mean)/sd,y=H*0.85-(H*0.7)*Math.exp(-0.5*z*z);ctx.lineTo(x,y);}
  ctx.lineTo(sx,H*0.85);ctx.closePath();ctx.fill();
  const z2=(sx-mean)/sd,dy=H*0.85-(H*0.7)*Math.exp(-0.5*z2*z2);
  ctx.beginPath();ctx.arc(sx,dy,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.strokeStyle="rgba(15,30,56,0.2)";ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
}

function buildRadar(s){
  new Chart(document.getElementById("radarChart"),{
    type:"radar",
    data:{labels:["A: Autonomy","B: Social-Ability","C: Pace","D: Conformity"],
      datasets:[
        {label:"Public",data:[s.A.pub,s.B.pub,s.C.pub,s.D.pub],borderColor:"#c9973a",backgroundColor:"rgba(201,151,58,0.15)",borderWidth:2,pointBackgroundColor:"#c9973a",borderDash:[5,5]},
        {label:"Private",data:[s.A.priv,s.B.priv,s.C.priv,s.D.priv],borderColor:"#0f1e38",backgroundColor:"rgba(15,30,56,0.1)",borderWidth:2,pointBackgroundColor:"#0f1e38"}
      ]},
    options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:10},color:"#6b7a94"},grid:{color:"rgba(15,30,56,0.08)"},pointLabels:{font:{size:11},color:"#1a1a2e"}}},plugins:{legend:{display:false}}}
  });
}

function buildTraits(s){
  document.getElementById("traitSection").innerHTML=Object.entries(s).map(([t,v])=>{
    const td=TRAIT_DATA[t];const isH=v.priv>=50;const d=isH?td.high:td.low;const pos=classify(v.priv);
    return `<div class="trait-block">
      <div class="trait-block-header">
        <div class="trait-letter-big" style="color:${td.color}">${t}</div>
        <div><div class="trait-block-name">${td.name}</div><div class="trait-block-pos" style="color:${td.color}">${pos.label} &middot; ${v.priv}/100 &middot; ${isH?td.highLabel:td.lowLabel}</div></div>
      </div>
      <div class="spectrum-bar">
        <div class="spectrum-label-left">${td.lowLabel}</div>
        <div class="spectrum-track" style="overflow:visible">
          <div class="spectrum-fill" style="width:${v.priv}%;background:${td.color}40"></div>
          <div class="spectrum-dot" style="left:calc(${v.priv}% - 9px);background:${td.color};box-shadow:0 0 0 2px ${td.color}"></div>
        </div>
        <div class="spectrum-label-right">${td.highLabel}</div>
      </div>
      <p style="font-size:13px;color:var(--slate);line-height:1.6;margin-bottom:16px">${td.desc}</p>
      <div class="trait-cols">
        <div class="trait-col"><h5>Assets</h5><ul>${d.assets.map(a=>`<li>${a}</li>`).join("")}</ul></div>
        <div class="trait-col"><h5>Liabilities</h5><ul>${d.liabilities.map(a=>`<li>${a}</li>`).join("")}</ul></div>
        <div class="trait-col"><h5>Motivators</h5><ul>${d.motivators.map(a=>`<li>${a}</li>`).join("")}</ul></div>
      </div>
    </div>`;
  }).join("");
}

function buildGaps(s){
  const descs={A:"A gap on Autonomy means your internal drive for independence differs from how others see your assertiveness. High public/low private = performing confidence. Low public/high private = suppressing natural autonomy.",B:"A B gap is very common. Many people perform high social energy professionally but are privately more introverted. Large gaps on this dimension cause energy drain over time.",C:"A pace gap means you are running at a speed that doesn't match your internal setting. High public/low private = risk of burnout. Low public/high private = feeling held back.",D:"A D gap reveals your relationship with rules in context. High public/low private = performing precision but thinking freely inside. Low public/high private = internal rule-follower not seen that way."};
  document.getElementById("gapCards").innerHTML=Object.entries(s).map(([t,v])=>{
    const td=TRAIT_DATA[t];
    return `<div class="gap-card">
      <div class="gap-row">
        <div class="gap-letter" style="color:${td.color}">${t}</div>
        <div class="gap-label">${td.name}</div>
        <div class="gap-tags">
          <span class="gap-tag public">Public: ${classify(v.pub).short} (${v.pub})</span>
          <span class="gap-tag private">Private: ${classify(v.priv).short} (${v.priv})</span>
          ${v.gap>20?`<span class="gap-tag gap-high">Gap: ${v.gap} pts &#9888;</span>`:`<span style="font-size:11px;color:var(--slate);padding:3px 8px">Gap: ${v.gap}</span>`}
        </div>
      </div>
      <div class="gap-text">${descs[t]}</div>
    </div>`;
  }).join("");
}

function buildInsights(s,pt){
  const ins=[];const A=s.A.priv,B=s.B.priv,C=s.C.priv,D=s.D.priv;
  if(A>=65&&B>=65)ins.push({icon:"⚡",title:"Natural Leader",body:"High A and High B together create someone who drives outcomes AND brings people along. You have personal authority and social magnetism. The risk: assuming others share your pace and drive."});
  else if(A>=65&&B<45)ins.push({icon:"🎯",title:"Solo Achiever",body:"High independence with low social energy means you do your best work alone with full ownership. You may not need validation the way others do. Learn to communicate your results — they often speak quietly when they should speak loudly."});
  if(C>=65&&D<45)ins.push({icon:"🔥",title:"Fast and Fearless",body:"High pace with low conformity is the classic entrepreneur profile. You move fast, think outside the box, and treat rules as suggestions. Your risk: the wake you leave behind — incomplete tasks, inconsistency, and team members who cannot keep up."});
  else if(C<45&&D>=65)ins.push({icon:"🏗",title:"Builder of Lasting Things",body:"Slow and precise is not a weakness. It is the profile of people who build systems others rely on for decades. Your superpower is catching what fast people miss. Your risk: perfecting when good enough was needed yesterday."});
  const maxGap=Math.max(s.A.gap,s.B.gap,s.C.gap,s.D.gap);
  const gapT=Object.entries(s).find(([,v])=>v.gap===maxGap);
  if(maxGap>25&&gapT)ins.push({icon:"🎭",title:"Masked "+TRAIT_DATA[gapT[0]].name,body:`Your biggest gap is on ${TRAIT_DATA[gapT[0]].name} (${maxGap} pts between public and private). You are performing a version of yourself at work that differs from your internal wiring. This creates stress and energy drain over time. Finding environments where your private self is welcome is the key to sustainable performance.`});
  if(A>=60&&D>=60)ins.push({icon:"💎",title:"Driven to Perfection",body:"High autonomy and high conformity is rare and powerful. You want to own the outcome AND do it correctly. You set your own standards and they are high. The risk: perfectionism paralysis and impatience with those who do not share your precision."});
  if(B>=65&&C>=65)ins.push({icon:"🌊",title:"High-Energy Connector",body:"You operate fast and you do it with people around you. You build momentum quickly and energize others. The downside: you may move too fast for careful thinkers and your social optimism can miss red flags."});
  if(ins.length<3)ins.push({icon:"🧩",title:"Your Unique Combination",body:`The ${pt.name} profile is built from four dimensions that interact in ways no single label captures. Use your individual trait scores to understand where you are strongest and where you carry the most risk.`});
  document.getElementById("insightCards").innerHTML=ins.slice(0,4).map(c=>`<div class="insight-card"><div class="insight-card-icon">${c.icon}</div><div class="insight-card-title">${c.title}</div><div class="insight-card-body">${c.body}</div></div>`).join("");
}

function buildCoaching(s,first){
  const tips=[];const A=s.A.priv,B=s.B.priv,C=s.C.priv,D=s.D.priv;
  if(A>=65)tips.push(`Give ${first} full ownership over outcomes. They disengage when over-managed. Set the goal, then get out of the way. They are motivated by freedom, results, and uncapped incentives.`);
  else tips.push(`${first} needs clear direction and a manager who removes obstacles. Provide structure and harmony. Cover for their mistakes rather than publicly correcting them.`);
  if(B>=65)tips.push(`${first} is motivated by recognition, titles, and public praise. Communicate via phone, not just email. Celebrate their wins in front of others. They respond to money, trips, and plaques.`);
  else tips.push(`${first} is motivated by private praise and meaningful problems to solve. Avoid putting them on the spot socially. Give them space to think before they speak.`);
  if(C>=65)tips.push(`Set sub-deadlines and give ${first} variety. They thrive on urgency and get bored with repetition. Fast rewards and new challenges keep them engaged.`);
  else tips.push(`${first} needs consistent workflows, clear priorities, and inbox/outbox clarity. They are productive under deadlines but struggle in chaotic environments. Predictability is their fuel.`);
  if(D>=65)tips.push(`Give ${first} time to do things correctly. Define what good enough looks like — otherwise they will refine indefinitely. Safety and learning time motivate them deeply.`);
  else tips.push(`${first} works best with freedom and latitude. Build parameters around the outcome, then step back completely. Do not micromanage their method — hold them to results only.`);
  const maxGap=Math.max(s.A.gap,s.B.gap,s.C.gap,s.D.gap);
  if(maxGap>25)tips.push(`Watch for burnout. ${first} has a significant gap between public and private self on at least one dimension. Create psychological safety so their private wiring can show up at work.`);
  document.getElementById("coachName").textContent=first;
  document.getElementById("coachingList").innerHTML=tips.map(t=>`<li>${t}</li>`).join("");
}

async function saveResult(s,pt){
  try{await fetch("/.netlify/functions/save-result",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:state.name,email:state.email,role:state.role,company:state.company,scores:s,profileType:{name:pt.name,desc:pt.desc},framework:"ABCD",timestamp:new Date().toISOString()})});}
  catch(e){console.warn("Could not save:",e);}
}
